name: Azure Docker CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: smart-retail-assistant

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Configure Azure Web App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config container set \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --container-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
              --container-registry-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
              --container-registry-user "${{ secrets.ACR_USERNAME }}" \
              --container-registry-password "${{ secrets.ACR_PASSWORD }}"

            az webapp config appsettings set \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --settings \
                WEBSITES_PORT=8000 \
                PORT=8000 \
                SCM_DO_BUILD_DURING_DEPLOYMENT=false \
                MONGO_URI="${{ secrets.MONGO_URI }}" \
                MONGO_DB_NAME="${{ vars.MONGO_DB_NAME }}" \
                MONGO_COLLECTION="${{ vars.MONGO_COLLECTION }}" \
                AZURE_LANGUAGE_KEY="${{ secrets.AZURE_LANGUAGE_KEY }}" \
                AZURE_LANGUAGE_ENDPOINT="${{ secrets.AZURE_LANGUAGE_ENDPOINT }}" \
                AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
                AZURE_STORAGE_CONTAINER="${{ vars.AZURE_STORAGE_CONTAINER }}" \
                FOUNDARY_API_KEY="${{ secrets.FOUNDARY_API_KEY }}" \
                FOUNDARY_ENDPOINT="${{ secrets.FOUNDARY_ENDPOINT }}" \
                FOUNDARY_API_VERSION="${{ vars.FOUNDARY_API_VERSION }}" \
                FOUNDARY_MODEL="${{ vars.FOUNDARY_MODEL }}" \
                EMBEDDING_MODEL="${{ vars.EMBEDDING_MODEL }}"

            az webapp restart \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}"
